name: Build and Push Images

on:
  # 定时触发：每天 UTC 2:00 (北京时间 10:00)
  schedule:
    - cron: '0 2 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      config:
        description: '配置文件名称 (如 pytorch-images.yml，留空构建所有)'
        required: false
        default: ''
      push:
        description: '是否推送到仓库'
        type: boolean
        default: true
      skip_scan:
        description: '跳过安全扫描'
        type: boolean
        default: false
      skip_sbom:
        description: '跳过 SBOM 生成'
        type: boolean
        default: false

  # 配置文件变更时触发
  push:
    branches: [main]
    paths:
      - 'config/*-images.yml'

env:
  REGISTRY: quay.io
  ORG: ${{ vars.QUAY_ORG || 'kerer-ai' }}

jobs:
  # ==================== 准备阶段 ====================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.detect.outputs.configs }}
    steps:
      - name: Checkout image-factory
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 需要获取历史来检测变更

      - name: Detect configs to build
        id: detect
        run: |
          pip install pyyaml

          if [ -n "${{ github.event.inputs.config }}" ]; then
            # 手动触发，指定配置文件
            config_file="config/${{ github.event.inputs.config }}"
            if [ -f "$config_file" ]; then
              configs='["'"$config_file"'"]'
              echo "Using specified config: $config_file"
            else
              echo "Error: Config file not found: $config_file"
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Push 触发，检测变更的配置文件
            changed=$(git diff --name-only HEAD~1 HEAD | grep 'config/.*-images.yml' || true)
            if [ -z "$changed" ]; then
              configs='[]'
              echo "No config changes detected"
            else
              configs=$(echo "$changed" | jq -R -s -c 'split("\n") | map(select(length > 0))')
              echo "Changed configs: $configs"
            fi
          else
            # 定时触发，构建所有配置
            configs=$(ls config/*-images.yml 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo '[]')
            echo "Building all configs: $configs"
          fi
          echo "configs=${configs}" >> $GITHUB_OUTPUT

      - name: Validate configs
        if: steps.detect.outputs.configs != '[]'
        run: |
          configs='${{ steps.detect.outputs.configs }}'
          for config in $(echo "$configs" | jq -r '.[]'); do
            echo "Validating $config..."
            python3 scripts/validate-config.py "$config"
          done

  # ==================== 克隆源仓库 ====================
  clone:
    needs: prepare
    if: needs.prepare.outputs.configs != '[]'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - name: Checkout image-factory
        uses: actions/checkout@v4

      - name: Clone source repositories
        run: |
          mkdir -p sources
          configs='${{ needs.prepare.outputs.configs }}'
          for config in $(echo "$configs" | jq -r '.[]'); do
            echo "Cloning sources from $config..."
            python3 scripts/clone-sources.py \
              --config "$config" \
              --output sources/
          done

      - name: Scan Dockerfiles and generate matrix
        id: scan
        run: |
          configs='${{ needs.prepare.outputs.configs }}'
          first_config=$(echo "$configs" | jq -r '.[0]')
          python3 scripts/scan-dockerfiles.py \
            --config "$first_config" \
            --sources sources/ \
            --output matrix.json

          matrix=$(cat matrix.json | jq -c '.matrix')
          echo "matrix=${matrix}" >> $GITHUB_OUTPUT

      - name: Upload sources
        uses: actions/upload-artifact@v4
        with:
          name: sources
          path: sources/
          retention-days: 1

  # ==================== 构建阶段 ====================
  build:
    needs: clone
    if: needs.clone.outputs.matrix != '[]'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.clone.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources
          path: sources/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}
          tags: |
            ${{ matrix.tags }}
            type=sha,prefix=

      - name: Set cache config
        id: cache
        run: |
          if [ "${{ github.event.inputs.push }}" != "false" ]; then
            CACHE_FROM="type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:buildcache-${{ matrix.platforms == 'linux/amd64' && 'amd64' || 'arm64' }}
          type=gha"
            CACHE_TO="type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:buildcache-${{ matrix.platforms == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max
          type=gha,mode=max"
          else
            CACHE_FROM="type=gha"
            CACHE_TO="type=gha,mode=max"
          fi
          echo "cache_from<<EOF" >> $GITHUB_OUTPUT
          echo "$CACHE_FROM" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "cache_to<<EOF" >> $GITHUB_OUTPUT
          echo "$CACHE_TO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event.inputs.push != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ toJson(matrix.build_args) }}
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}

      - name: Pull image for scanning
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        run: |
          docker buildx imagetools create --tag ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}-local \
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}
          docker pull --platform ${{ matrix.platforms }} ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}

      - name: Run Trivy vulnerability scanner
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report-${{ matrix.first_tag }}.txt'

      - name: Upload Trivy scan results
        if: always() && github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.first_tag }}
          path: trivy-report-${{ matrix.first_tag }}.txt
          retention-days: 30

      - name: Generate SBOM (SPDX format)
        if: github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}
          format: 'spdx-json'
          output: 'sbom-${{ matrix.first_tag }}.spdx.json'

      - name: Generate SBOM (CycloneDX format)
        if: github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}
          format: 'cyclonedx'
          output: 'sbom-${{ matrix.first_tag }}.cdx.json'

      - name: Upload SBOM artifacts
        if: always() && github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.first_tag }}
          path: |
            sbom-${{ matrix.first_tag }}.spdx.json
            sbom-${{ matrix.first_tag }}.cdx.json
          retention-days: 30