name: Build and Push Images

on:
  # 定时触发：每天 UTC 2:00 (北京时间 10:00)
  schedule:
    - cron: '0 2 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      source:
        description: '源仓库名称 (留空构建所有)'
        required: false
        default: ''
      image:
        description: '镜像名称 (留空构建所有)'
        required: false
        default: ''
      repo_url:
        description: '临时仓库地址 (公开仓库)'
        required: false
        default: ''
      repo_branch:
        description: '临时仓库分支'
        required: false
        default: 'main'
      repo_dockerfile:
        description: 'Dockerfile 路径'
        required: false
        default: 'Dockerfile'
      push:
        description: '是否推送到仓库'
        type: boolean
        default: true
      skip_scan:
        description: '跳过安全扫描'
        type: boolean
        default: false
      skip_sbom:
        description: '跳过 SBOM 生成'
        type: boolean
        default: false

  # 配置文件变更时触发
  push:
    branches: [main]
    paths:
      - 'config/images.yaml'
      - '.github/workflows/build-images.yml'

env:
  REGISTRY: quay.io
  ORG: ${{ vars.QUAY_ORG || 'kerer-ai' }}

jobs:
  # ==================== 准备阶段 ====================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      is_temp_mode: ${{ steps.check.outputs.is_temp_mode }}
    steps:
      - name: Checkout image-factory
        uses: actions/checkout@v4

      - name: Check build mode
        id: check
        run: |
          if [ -n "${{ github.event.inputs.repo_url }}" ]; then
            echo "is_temp_mode=true" >> $GITHUB_OUTPUT
            echo "Build mode: Temporary repository"
          else
            echo "is_temp_mode=false" >> $GITHUB_OUTPUT
            echo "Build mode: Config-driven"
          fi

      - name: Validate config
        if: steps.check.outputs.is_temp_mode != 'true'
        run: |
          pip install pyyaml
          python3 scripts/validate-config.py config/images.yaml

      - name: Clone source repositories
        run: |
          mkdir -p sources

          if [ -n "${{ github.event.inputs.repo_url }}" ]; then
            # 临时仓库模式
            python3 scripts/clone-sources.py \
              --output sources/ \
              --repo-url "${{ github.event.inputs.repo_url }}" \
              --repo-branch "${{ github.event.inputs.repo_branch }}"
          else
            # 配置驱动模式
            python3 scripts/clone-sources.py \
              --config config/images.yaml \
              --output sources/
          fi

      - name: Scan Dockerfiles and generate matrix
        id: generate
        run: |
          if [ -n "${{ github.event.inputs.repo_url }}" ]; then
            python3 scripts/scan-dockerfiles.py \
              --sources sources/ \
              --output matrix.json \
              --repo-url "${{ github.event.inputs.repo_url }}" \
              --repo-dockerfile "${{ github.event.inputs.repo_dockerfile }}"
          else
            python3 scripts/scan-dockerfiles.py \
              --config config/images.yaml \
              --sources sources/ \
              --output matrix.json \
              --image "${{ github.event.inputs.image }}" \
              --source "${{ github.event.inputs.source }}"
          fi

          matrix=$(cat matrix.json | jq -c '.matrix')
          echo "matrix=${matrix}" >> $GITHUB_OUTPUT

      - name: Upload sources
        uses: actions/upload-artifact@v4
        with:
          name: sources
          path: sources/
          retention-days: 1

  # ==================== 构建阶段 ====================
  build:
    needs: prepare
    if: needs.prepare.outputs.matrix != '[]'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources
          path: sources/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}
          tags: |
            ${{ matrix.tags }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event.inputs.push != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ toJson(matrix.build_args) }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:buildcache-${{ matrix.platforms == 'linux/amd64' && 'amd64' || 'arm64' }}
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:buildcache-${{ matrix.platforms == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max
            type=gha,mode=max

      - name: Pull image for scanning
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        run: |
          docker buildx imagetools create --tag ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}-local \
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}
          docker pull --platform ${{ matrix.platforms }} ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}

      - name: Run Trivy vulnerability scanner
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report-${{ matrix.first_tag }}.txt'

      - name: Upload Trivy scan results
        if: always() && github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.first_tag }}
          path: trivy-report-${{ matrix.first_tag }}.txt
          retention-days: 30

      - name: Generate SBOM (SPDX format)
        if: github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}
          format: 'spdx-json'
          output: 'sbom-${{ matrix.first_tag }}.spdx.json'

      - name: Generate SBOM (CycloneDX format)
        if: github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image_name }}:${{ matrix.first_tag }}
          format: 'cyclonedx'
          output: 'sbom-${{ matrix.first_tag }}.cdx.json'

      - name: Upload SBOM artifacts
        if: always() && github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.first_tag }}
          path: |
            sbom-${{ matrix.first_tag }}.spdx.json
            sbom-${{ matrix.first_tag }}.cdx.json
          retention-days: 30