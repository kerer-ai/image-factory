name: Build and Push Images

on:
  # 定时触发：每天 UTC 2:00 (北京时间 10:00)
  schedule:
    - cron: '0 2 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      config:
        description: '配置文件名称 (如 pytorch-images.yml，留空构建所有)'
        required: false
        default: ''
      push:
        description: '是否推送到仓库'
        type: boolean
        default: true
      skip_scan:
        description: '跳过安全扫描'
        type: boolean
        default: false
      skip_sbom:
        description: '跳过 SBOM 生成'
        type: boolean
        default: false

  # 配置文件变更时触发
  push:
    branches: [main]
    paths:
      - 'config/*-images.yml'

jobs:
  # ==================== 准备阶段 ====================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.detect.outputs.configs }}
    steps:
      - name: Checkout image-factory
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 需要获取历史来检测变更

      - name: Detect configs to build
        id: detect
        run: |
          pip install pyyaml

          if [ -n "${{ github.event.inputs.config }}" ]; then
            # 手动触发，指定配置文件
            config_file="config/${{ github.event.inputs.config }}"
            if [ -f "$config_file" ]; then
              configs='["'"$config_file"'"]'
              echo "Using specified config: $config_file"
            else
              echo "Error: Config file not found: $config_file"
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Push 触发，检测变更的配置文件
            changed=$(git diff --name-only HEAD~1 HEAD | grep 'config/.*-images.yml' || true)
            if [ -z "$changed" ]; then
              configs='[]'
              echo "No config changes detected"
            else
              configs=$(echo "$changed" | jq -R -s -c 'split("\n") | map(select(length > 0))')
              echo "Changed configs: $configs"
            fi
          else
            # 定时触发，构建所有配置
            configs=$(ls config/*-images.yml 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo '[]')
            echo "Building all configs: $configs"
          fi
          echo "configs=${configs}" >> $GITHUB_OUTPUT

      - name: Validate configs
        if: steps.detect.outputs.configs != '[]'
        run: |
          configs='${{ steps.detect.outputs.configs }}'
          for config in $(echo "$configs" | jq -r '.[]'); do
            echo "Validating $config..."
            python3 scripts/validate-config.py "$config"
          done

  # ==================== 克隆源仓库 ====================
  clone:
    needs: prepare
    if: needs.prepare.outputs.configs != '[]'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - name: Checkout image-factory
        uses: actions/checkout@v4

      - name: Clone source repositories
        run: |
          mkdir -p sources
          configs='${{ needs.prepare.outputs.configs }}'
          for config in $(echo "$configs" | jq -r '.[]'); do
            echo "Cloning sources from $config..."
            python3 scripts/clone-sources.py \
              --config "$config" \
              --output sources/
          done

      - name: Scan Dockerfiles and generate matrix
        id: scan
        run: |
          configs='${{ needs.prepare.outputs.configs }}'
          config_args=$(echo "$configs" | jq -r '.[]' | xargs -I {} echo "--config {}")
          python3 scripts/scan-dockerfiles.py \
            $config_args \
            --sources sources/ \
            --output matrix.json

          matrix=$(cat matrix.json | jq -c '.matrix')
          echo "matrix=${matrix}" >> $GITHUB_OUTPUT

      - name: Upload sources
        uses: actions/upload-artifact@v4
        with:
          name: sources
          path: sources/
          retention-days: 1

  # ==================== 构建阶段 ====================
  build:
    needs: clone
    if: needs.clone.outputs.matrix != '[]'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.clone.outputs.matrix) }}
      fail-fast: false
    outputs:
      build_status: ${{ steps.build_info.outputs.status }}
      image_name: ${{ steps.build_info.outputs.image_name }}
      platform: ${{ steps.build_info.outputs.platform }}
      first_tag: ${{ steps.build_info.outputs.first_tag }}
    env:
      REGISTRY: ${{ matrix.registry }}
      ORG: ${{ matrix.org }}
    steps:
      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources
          path: sources/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Generate timestamp and tags
        id: tags
        run: |
          # 生成时间戳 yyyymmddHHMMSS
          TIMESTAMP=$(date -u '+%Y%m%d%H%M%S')
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

          # 将平台中的 / 替换为 -（用于 artifact 名称）
          PLATFORM_SAFE=$(echo "${{ matrix.platforms }}" | tr '/' '-')
          echo "platform_safe=${PLATFORM_SAFE}" >> $GITHUB_OUTPUT

          # 解析原始 tags 并添加时间戳后缀
          ORIGINAL_TAGS='${{ matrix.tags }}'
          TAGS_WITH_TIMESTAMP=""

          while IFS= read -r tag_line; do
            if [ -n "$tag_line" ]; then
              # 提取 tag 值
              tag_value=$(echo "$tag_line" | sed 's/type=raw,value=//')

              # 添加时间戳后缀
              new_tag="${tag_value}-${TIMESTAMP}"

              if [ -z "$TAGS_WITH_TIMESTAMP" ]; then
                TAGS_WITH_TIMESTAMP="type=raw,value=${new_tag}"
              else
                TAGS_WITH_TIMESTAMP="${TAGS_WITH_TIMESTAMP}"$'\n'"type=raw,value=${new_tag}"
              fi
            fi
          done <<< "$ORIGINAL_TAGS"

          echo "tags_with_timestamp<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS_WITH_TIMESTAMP" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 输出第一个带时间戳的标签用于后续扫描
          FIRST_TAG=$(echo "$TAGS_WITH_TIMESTAMP" | head -1 | sed 's/type=raw,value=//')
          echo "first_tag_with_timestamp=${FIRST_TAG}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}
          tags: |
            ${{ steps.tags.outputs.tags_with_timestamp }}

      - name: Set cache config
        id: cache
        run: |
          # 始终使用 GHA 缓存作为读取源（更可靠）
          CACHE_FROM="type=gha"

          # 推送时同时写入 registry 缓存和 GHA 缓存
          if [ "${{ github.event.inputs.push }}" != "false" ]; then
            CACHE_TO="type=gha,mode=max"
          else
            CACHE_TO="type=gha,mode=max"
          fi
          echo "cache_from=${CACHE_FROM}" >> $GITHUB_OUTPUT
          echo "cache_to=${CACHE_TO}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event.inputs.push != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ toJson(matrix.build_args) }}
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}

      - name: Pull image for scanning
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        run: |
          docker pull --platform ${{ matrix.platforms }} ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}:${{ steps.tags.outputs.first_tag_with_timestamp }}

      - name: Run Trivy vulnerability scanner
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}:${{ steps.tags.outputs.first_tag_with_timestamp }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.txt'

      - name: Upload Trivy scan results
        if: always() && github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}
          path: trivy-report-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.txt
          retention-days: 30

      - name: Generate SBOM (SPDX format)
        if: github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}:${{ steps.tags.outputs.first_tag_with_timestamp }}
          format: 'spdx-json'
          output: 'sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.spdx.json'

      - name: Generate SBOM (CycloneDX format)
        if: github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}:${{ steps.tags.outputs.first_tag_with_timestamp }}
          format: 'cyclonedx'
          output: 'sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.cdx.json'

      - name: Upload SBOM artifacts
        if: always() && github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}
          path: |
            sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.spdx.json
            sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.cdx.json
          retention-days: 30

      - name: Output build info
        id: build_info
        if: always()
        run: |
          # 输出构建状态
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
          echo "image_name=${{ matrix.image_name }}" >> $GITHUB_OUTPUT
          echo "repository=${{ matrix.repository }}" >> $GITHUB_OUTPUT
          echo "platform=${{ matrix.platforms }}" >> $GITHUB_OUTPUT
          echo "first_tag=${{ steps.tags.outputs.first_tag_with_timestamp }}" >> $GITHUB_OUTPUT

          # 创建构建信息文件供 summary 使用
          mkdir -p build-info
          cat > build-info/info.json << EOF
          {
            "status": "${{ job.status }}",
            "image_name": "${{ matrix.image_name }}",
            "repository": "${{ matrix.repository }}",
            "platform": "${{ matrix.platforms }}",
            "first_tag": "${{ steps.tags.outputs.first_tag_with_timestamp }}",
            "registry": "${{ env.REGISTRY }}",
            "org": "${{ env.ORG }}"
          }
          EOF

      - name: Upload build info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}
          path: build-info/info.json
          retention-days: 1

  # ==================== 构建总结 ====================
  summary:
    needs: build
    if: always() && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build info artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-info-*
          path: build-infos/
          merge-multiple: false

      - name: Download all Trivy report artifacts
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-report-*
          path: trivy-reports/
          merge-multiple: false

      - name: Generate build summary
        run: |
          echo "## 🏗️ 构建总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 统计构建数量
          total_builds=$(find build-infos -name "info.json" 2>/dev/null | wc -l)
          success_builds=$(find build-infos -name "info.json" -exec grep -l '"status": "success"' {} \; 2>/dev/null | wc -l)
          failed_builds=$((total_builds - success_builds))

          echo "### 📊 构建统计" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 指标 | 数量 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 总构建数 | $total_builds |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ 成功 | $success_builds |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ 失败 | $failed_builds |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 镜像列表和下载命令
          echo "### 📦 构建镜像" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| 镜像 | 平台 | 标签 | 下载命令 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|----------|" >> $GITHUB_STEP_SUMMARY

          for info_file in build-infos/*/info.json; do
            if [ -f "$info_file" ]; then
              status=$(jq -r '.status' "$info_file")
              image_name=$(jq -r '.image_name' "$info_file")
              repository=$(jq -r '.repository' "$info_file")
              platform=$(jq -r '.platform' "$info_file")
              first_tag=$(jq -r '.first_tag' "$info_file")
              registry=$(jq -r '.registry' "$info_file")
              org=$(jq -r '.org' "$info_file")

              if [ "$status" = "success" ]; then
                pull_cmd="docker pull $registry/$org/$repository:$first_tag"
                echo "| \`$image_name\` | \`$platform\` | \`$first_tag\` | \`$pull_cmd\` |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| \`$image_name\` | \`$platform\` | \`$first_tag\` | ❌ 构建失败 |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # 漏洞扫描总结
          if [ "${{ github.event.inputs.skip_scan }}" != "true" ] && [ "${{ github.event.inputs.push }}" != "false" ]; then
            echo "### 🔒 安全扫描结果" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "| 镜像标签 | CRITICAL | HIGH | MEDIUM | LOW | 状态 |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|----------|------|--------|-----|------|" >> $GITHUB_STEP_SUMMARY

            for report_dir in trivy-reports/trivy-report-*; do
              if [ -d "$report_dir" ]; then
                # 获取标签名
                tag=$(basename "$report_dir")
                report_file=$(find "$report_dir" -name "*.txt" | head -1)

                if [ -f "$report_file" ]; then
                  # 解析 Trivy Total 行获取漏洞统计
                  total_line=$(grep -E "^Total:" "$report_file" | tail -1)

                  if [ -n "$total_line" ]; then
                    # 解析: Total: 5 (UNKNOWN: 0, LOW: 1, MEDIUM: 2, HIGH: 1, CRITICAL: 1)
                    critical=$(echo "$total_line" | grep -oP 'CRITICAL:\s*\K\d+' || echo "0")
                    high=$(echo "$total_line" | grep -oP 'HIGH:\s*\K\d+' || echo "0")
                    medium=$(echo "$total_line" | grep -oP 'MEDIUM:\s*\K\d+' || echo "0")
                    low=$(echo "$total_line" | grep -oP 'LOW:\s*\K\d+' || echo "0")
                  else
                    # 如果没有 Total 行，可能是无漏洞或解析失败
                    critical=0
                    high=0
                    medium=0
                    low=0
                  fi

                  # 判断安全状态
                  if [ "$critical" -gt 0 ]; then
                    status="🔴 存在严重漏洞"
                  elif [ "$high" -gt 0 ]; then
                    status="🟡 存在高危漏洞"
                  elif [ "$medium" -gt 0 ] || [ "$low" -gt 0 ]; then
                    status="🟢 存在低/中危漏洞"
                  else
                    status="✅ 无已知漏洞"
                  fi

                  echo "| \`$tag\` | $critical | $high | $medium | $low | $status |" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            done

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ 注意：漏洞扫描仅报告 CRITICAL 和 HIGH 级别漏洞，不阻止镜像推送" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # 构建产物说明
          echo "### 📁 构建产物" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "本次构建生成以下产物（保留 30 天）：" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 产物类型 | 命名格式 | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy 扫描报告 | \`trivy-report-<tag>.txt\` | 漏洞扫描详细结果 |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (SPDX) | \`sbom-<tag>.spdx.json\` | SPDX 格式软件物料清单 |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (CycloneDX) | \`sbom-<tag>.cdx.json\` | CycloneDX 格式软件物料清单 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 构建信息
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ℹ️ 构建信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **构建时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **仓库**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY