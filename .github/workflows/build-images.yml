name: Build and Push Images

on:
  # 定时触发：每天 UTC 2:00 (北京时间 10:00)
  schedule:
    - cron: '0 2 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      config:
        description: '配置文件名称 (如 pytorch-images.yml，留空构建所有)'
        required: false
        default: ''
      push:
        description: '是否推送到仓库'
        type: boolean
        default: true
      skip_scan:
        description: '跳过安全扫描'
        type: boolean
        default: false
      skip_sbom:
        description: '跳过 SBOM 生成'
        type: boolean
        default: false

  # 配置文件变更时触发
  push:
    branches: [main]
    paths:
      - 'config/*-images.yml'

jobs:
  # ==================== 准备阶段：解析配置 + 克隆源 + 生成矩阵 ====================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout image-factory
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect configs to build
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.config }}" ]; then
            # 手动触发，指定配置文件
            config_file="config/${{ github.event.inputs.config }}"
            if [ -f "$config_file" ]; then
              configs="$config_file"
              echo "Using specified config: $config_file"
            else
              echo "Error: Config file not found: $config_file"
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Push 触发，检测变更的配置文件
            configs=$(git diff --name-only HEAD~1 HEAD | grep 'config/.*-images.yml' || true)
            if [ -z "$configs" ]; then
              configs=""
              echo "No config changes detected"
            else
              echo "Changed configs: $configs"
            fi
          else
            # 定时触发，构建所有配置
            configs=$(ls config/*-images.yml 2>/dev/null | tr '\n' ' ')
            echo "Building all configs: $configs"
          fi
          # 保存到文件，避免多行问题
          echo "$configs" > /tmp/configs.txt

      - name: Parse configs and generate matrix
        id: matrix
        run: |
          # 安装 yq 用于解析 YAML
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # 读取配置文件列表
          configs=$(cat /tmp/configs.txt | tr '\n' ' ' | xargs)

          if [ -z "$configs" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 全局默认配置
          DEFAULT_REGISTRY="quay.io"
          DEFAULT_ORG="kerer"

          # 存储所有镜像配置
          declare -a all_images=()

          # 解析每个配置文件
          for config_file in $configs; do
            echo "Processing: $config_file"

            # 验证配置文件
            if [ ! -f "$config_file" ]; then
              echo "Warning: Config file not found: $config_file"
              continue
            fi

            # 获取全局配置
            registry=$(yq '.registry // "'"$DEFAULT_REGISTRY"'"' "$config_file")
            org=$(yq '.org // "'"$DEFAULT_ORG"'"' "$config_file")

            # 获取源仓库数量
            source_count=$(yq '.sources | length' "$config_file")

            # 获取镜像数量
            image_count=$(yq '.images | length' "$config_file")

            echo "  Registry: $registry, Org: $org"
            echo "  Sources: $source_count, Images: $image_count"

            # 解析每个镜像配置
            for i in $(seq 0 $((image_count - 1))); do
              image_name=$(yq ".images[$i].name" "$config_file")
              source_name=$(yq ".images[$i].source" "$config_file")
              dockerfile=$(yq ".images[$i].dockerfile // \"Dockerfile\"" "$config_file")
              context=$(yq ".images[$i].context // \"\"" "$config_file")
              repository=$(yq ".images[$i].repository // \"\"" "$config_file")
              img_registry=$(yq ".images[$i].registry // \"$registry\"" "$config_file")
              img_org=$(yq ".images[$i].org // \"$org\"" "$config_file")

              # 验证必填字段
              if [ -z "$repository" ] || [ "$repository" = "null" ]; then
                echo "Error: Image '$image_name' missing required field 'repository'"
                continue
              fi

              # 获取 tags
              tags=$(yq ".images[$i].tags | join(\",\")" "$config_file")
              if [ -z "$tags" ] || [ "$tags" = "null" ]; then
                tags="latest"
              fi

              # 获取 platforms
              platforms=$(yq ".images[$i].platforms | join(\",\")" "$config_file")
              if [ -z "$platforms" ] || [ "$platforms" = "null" ]; then
                platforms="linux/amd64,linux/arm64"
              fi

              # 获取 build_args
              build_args=$(yq ".images[$i].build_args | to_entries | map(.key + \"=\" + .value) | join(\",\")" "$config_file")
              if [ "$build_args" = "null" ]; then
                build_args=""
              fi

              # 获取源仓库的分支
              branch=$(yq ".sources[] | select(.name == \"$source_name\") | .branch // .ref // \"main\"" "$config_file")

              # 为每个平台创建构建任务
              IFS=',' read -ra PLATFORM_ARRAY <<< "$platforms"
              for platform in "${PLATFORM_ARRAY[@]}"; do
                platform=$(echo "$platform" | xargs)  # trim whitespace

                # 确定 runner
                if [ "$platform" = "linux/arm64" ]; then
                  runner="ubuntu-22.04-arm"
                else
                  runner="ubuntu-latest"
                fi

                # 构建 tags 字符串（用于 docker metadata-action）
                tags_str=""
                IFS=',' read -ra TAG_ARRAY <<< "$tags"
                for tag in "${TAG_ARRAY[@]}"; do
                  tag=$(echo "$tag" | xargs)
                  if [ -z "$tags_str" ]; then
                    tags_str="type=raw,value=$tag"
                  else
                    tags_str="$tags_str
          type=raw,value=$tag"
                  fi
                done

                # 构建矩阵条目（使用 jq 构建 JSON）
                entry=$(jq -n \
                  --arg image_name "$image_name" \
                  --arg source "$source_name" \
                  --arg branch "$branch" \
                  --arg dockerfile "$dockerfile" \
                  --arg context "$context" \
                  --arg repository "$repository" \
                  --arg registry "$img_registry" \
                  --arg org "$img_org" \
                  --arg tags "$tags" \
                  --arg tags_str "$tags_str" \
                  --arg first_tag "$(echo "$tags" | cut -d',' -f1 | xargs)" \
                  --arg platform "$platform" \
                  --arg runner "$runner" \
                  --arg build_args "$build_args" \
                  '{image_name: $image_name, source: $source, branch: $branch, dockerfile: $dockerfile, context: $context, repository: $repository, registry: $registry, org: $org, tags: $tags, tags_str: $tags_str, first_tag: $first_tag, platform: $platform, runner: $runner, build_args: $build_args}')
                all_images+=("$entry")
              done
            done
          done

          # 生成最终矩阵 JSON
          if [ ${#all_images[@]} -eq 0 ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            matrix_json=$(printf '%s\n' "${all_images[@]}" | jq -s '.')
            echo "matrix=${matrix_json}" >> $GITHUB_OUTPUT

            echo ""
            echo "Generated build matrix:"
            echo "$matrix_json" | jq -r '.[] | "  - \(.image_name): \(.first_tag) (\(.platform)) -> \(.registry)/\(.org)/\(.repository)"'
          fi

      - name: Clone source repositories
        if: steps.matrix.outputs.matrix != '[]'
        run: |
          mkdir -p sources

          # 获取唯一的源仓库列表
          sources=$(echo '${{ steps.matrix.outputs.matrix }}' | jq -r '.[].source' | sort -u)

          # 获取配置文件中的源仓库信息
          configs=$(cat /tmp/configs.txt | tr '\n' ' ' | xargs)

          declare -A source_urls
          declare -A source_refs

          for config_file in $configs; do
            source_count=$(yq '.sources | length' "$config_file")
            for i in $(seq 0 $((source_count - 1))); do
              name=$(yq ".sources[$i].name" "$config_file")
              url=$(yq ".sources[$i].url" "$config_file")
              ref=$(yq ".sources[$i].ref // .sources[$i].branch // \"main\"" "$config_file")
              source_urls["$name"]="$url"
              source_refs["$name"]="$ref"
            done
          done

          # 克隆每个源仓库
          for source in $sources; do
            url="${source_urls[$source]}"
            ref="${source_refs[$source]}"

            if [ -z "$url" ]; then
              echo "Error: Source URL not found for $source"
              continue
            fi

            echo "Cloning $source from $url (ref: $ref)..."
            git clone --depth 1 --branch "$ref" "$url" "sources/$source"

            # 检查 submodule
            if [ -f "sources/$source/.gitmodules" ]; then
              echo "Initializing submodules for $source..."
              cd "sources/$source"
              git submodule update --init --recursive --depth 1
              cd -
            fi
          done

          echo ""
          echo "Cloned sources:"
          ls -la sources/

      - name: Upload sources
        if: steps.matrix.outputs.matrix != '[]'
        uses: actions/upload-artifact@v4
        with:
          name: sources
          path: sources/
          retention-days: 1

  # ==================== 构建阶段 ====================
  build:
    needs: prepare
    if: needs.prepare.outputs.matrix != '[]'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    outputs:
      build_status: ${{ steps.build_info.outputs.status }}
      image_name: ${{ steps.build_info.outputs.image_name }}
      platform: ${{ steps.build_info.outputs.platform }}
      first_tag: ${{ steps.build_info.outputs.first_tag }}
    env:
      REGISTRY: ${{ matrix.registry }}
      ORG: ${{ matrix.org }}
    steps:
      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: sources
          path: sources/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Generate timestamp and tags
        id: tags
        run: |
          # 生成时间戳 yyyymmddHHMMSS
          TIMESTAMP=$(date -u '+%Y%m%d%H%M%S')
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

          # 将平台中的 / 替换为 -（用于 artifact 名称）
          PLATFORM_SAFE=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "platform_safe=${PLATFORM_SAFE}" >> $GITHUB_OUTPUT

          # 解析原始 tags 并添加时间戳后缀
          ORIGINAL_TAGS='${{ matrix.tags }}'
          TAGS_WITH_TIMESTAMP=""

          IFS=',' read -ra TAG_ARRAY <<< "$ORIGINAL_TAGS"
          for tag in "${TAG_ARRAY[@]}"; do
            tag=$(echo "$tag" | xargs)
            new_tag="${tag}-${TIMESTAMP}"

            if [ -z "$TAGS_WITH_TIMESTAMP" ]; then
              TAGS_WITH_TIMESTAMP="type=raw,value=${new_tag}"
            else
              TAGS_WITH_TIMESTAMP="${TAGS_WITH_TIMESTAMP}"$'\n'"type=raw,value=${new_tag}"
            fi
          done

          echo "tags_with_timestamp<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS_WITH_TIMESTAMP" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 输出第一个带时间戳的标签用于后续扫描
          FIRST_TAG=$(echo "$TAGS_WITH_TIMESTAMP" | head -1 | sed 's/type=raw,value=//')
          echo "first_tag_with_timestamp=${FIRST_TAG}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}
          tags: |
            ${{ steps.tags.outputs.tags_with_timestamp }}

      - name: Build context path
        id: context
        run: |
          # 确定构建上下文路径
          if [ -n "${{ matrix.context }}" ]; then
            CONTEXT="sources/${{ matrix.source }}/${{ matrix.context }}"
          else
            CONTEXT="sources/${{ matrix.source }}"
          fi
          echo "context=${CONTEXT}" >> $GITHUB_OUTPUT
          echo "Build context: ${CONTEXT}"

      - name: Set cache config
        id: cache
        run: |
          echo "cache_from=type=gha" >> $GITHUB_OUTPUT
          echo "cache_to=type=gha,mode=max" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.context }}
          file: sources/${{ matrix.source }}/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.event.inputs.push != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.build_args != '' && format('{0}', matrix.build_args) || '' }}
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}

      - name: Pull image for scanning
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        run: |
          docker pull --platform ${{ matrix.platform }} ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}:${{ steps.tags.outputs.first_tag_with_timestamp }}

      - name: Run Trivy vulnerability scanner
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}:${{ steps.tags.outputs.first_tag_with_timestamp }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.txt'

      - name: Upload Trivy scan results
        if: always() && github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}
          path: trivy-report-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.txt
          retention-days: 30

      - name: Generate SBOM (SPDX format)
        if: github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}:${{ steps.tags.outputs.first_tag_with_timestamp }}
          format: 'spdx-json'
          output: 'sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.spdx.json'

      - name: Generate SBOM (CycloneDX format)
        if: github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.repository }}:${{ steps.tags.outputs.first_tag_with_timestamp }}
          format: 'cyclonedx'
          output: 'sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.cdx.json'

      - name: Upload SBOM artifacts
        if: always() && github.event.inputs.skip_sbom != 'true' && github.event.inputs.push != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}
          path: |
            sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.spdx.json
            sbom-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}.cdx.json
          retention-days: 30

      - name: Output build info
        id: build_info
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
          echo "image_name=${{ matrix.image_name }}" >> $GITHUB_OUTPUT
          echo "repository=${{ matrix.repository }}" >> $GITHUB_OUTPUT
          echo "platform=${{ matrix.platform }}" >> $GITHUB_OUTPUT
          echo "first_tag=${{ steps.tags.outputs.first_tag_with_timestamp }}" >> $GITHUB_OUTPUT

          mkdir -p build-info
          cat > build-info/info.json << EOF
          {
            "status": "${{ job.status }}",
            "image_name": "${{ matrix.image_name }}",
            "repository": "${{ matrix.repository }}",
            "platform": "${{ matrix.platform }}",
            "first_tag": "${{ steps.tags.outputs.first_tag_with_timestamp }}",
            "registry": "${{ env.REGISTRY }}",
            "org": "${{ env.ORG }}"
          }
          EOF

      - name: Upload build info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ steps.tags.outputs.first_tag_with_timestamp }}-${{ steps.tags.outputs.platform_safe }}
          path: build-info/info.json
          retention-days: 1

  # ==================== 构建总结 ====================
  summary:
    needs: build
    if: always() && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build info artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-info-*
          path: build-infos/
          merge-multiple: false

      - name: Download all Trivy report artifacts
        if: github.event.inputs.skip_scan != 'true' && github.event.inputs.push != 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-report-*
          path: trivy-reports/
          merge-multiple: false

      - name: Generate build summary
        run: |
          echo "## 🏗️ 构建总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total_builds=$(find build-infos -name "info.json" 2>/dev/null | wc -l)
          success_builds=$(find build-infos -name "info.json" -exec grep -l '"status": "success"' {} \; 2>/dev/null | wc -l)
          failed_builds=$((total_builds - success_builds))

          echo "### 📊 构建统计" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 指标 | 数量 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 总构建数 | $total_builds |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ 成功 | $success_builds |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ 失败 | $failed_builds |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📦 构建镜像" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 平台 | 标签 | 下载命令 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|----------|" >> $GITHUB_STEP_SUMMARY

          for info_file in build-infos/*/info.json; do
            if [ -f "$info_file" ]; then
              status=$(jq -r '.status' "$info_file")
              image_name=$(jq -r '.image_name' "$info_file")
              repository=$(jq -r '.repository' "$info_file")
              platform=$(jq -r '.platform' "$info_file")
              first_tag=$(jq -r '.first_tag' "$info_file")
              registry=$(jq -r '.registry' "$info_file")
              org=$(jq -r '.org' "$info_file")

              if [ "$status" = "success" ]; then
                pull_cmd="docker pull $registry/$org/$repository:$first_tag"
                echo "| \`$image_name\` | \`$platform\` | \`$first_tag\` | \`$pull_cmd\` |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| \`$image_name\` | \`$platform\` | \`$first_tag\` | ❌ 构建失败 |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.skip_scan }}" != "true" ] && [ "${{ github.event.inputs.push }}" != "false" ]; then
            echo "### 🔒 安全扫描结果" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 镜像标签 | CRITICAL | HIGH | MEDIUM | LOW | 状态 |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|----------|------|--------|-----|------|" >> $GITHUB_STEP_SUMMARY

            for report_dir in trivy-reports/trivy-report-*; do
              if [ -d "$report_dir" ]; then
                tag=$(basename "$report_dir")
                report_file=$(find "$report_dir" -name "*.txt" | head -1)

                if [ -f "$report_file" ]; then
                  total_line=$(grep -E "^Total:" "$report_file" | tail -1)

                  if [ -n "$total_line" ]; then
                    critical=$(echo "$total_line" | grep -oP 'CRITICAL:\s*\K\d+' || echo "0")
                    high=$(echo "$total_line" | grep -oP 'HIGH:\s*\K\d+' || echo "0")
                    medium=$(echo "$total_line" | grep -oP 'MEDIUM:\s*\K\d+' || echo "0")
                    low=$(echo "$total_line" | grep -oP 'LOW:\s*\K\d+' || echo "0")
                  else
                    critical=0
                    high=0
                    medium=0
                    low=0
                  fi

                  if [ "$critical" -gt 0 ]; then
                    status="🔴 存在严重漏洞"
                  elif [ "$high" -gt 0 ]; then
                    status="🟡 存在高危漏洞"
                  elif [ "$medium" -gt 0 ] || [ "$low" -gt 0 ]; then
                    status="🟢 存在低/中危漏洞"
                  else
                    status="✅ 无已知漏洞"
                  fi

                  echo "| \`$tag\` | $critical | $high | $medium | $low | $status |" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            done

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ 注意：漏洞扫描仅报告 CRITICAL 和 HIGH 级别漏洞，不阻止镜像推送" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### 📁 构建产物" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "本次构建生成以下产物（保留 30 天）：" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 产物类型 | 命名格式 | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy 扫描报告 | \`trivy-report-<tag>.txt\` | 漏洞扫描详细结果 |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (SPDX) | \`sbom-<tag>.spdx.json\` | SPDX 格式软件物料清单 |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (CycloneDX) | \`sbom-<tag>.cdx.json\` | CycloneDX 格式软件物料清单 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ℹ️ 构建信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **构建时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **仓库**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY