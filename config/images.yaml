# 镜像工厂配置文件
# 定义 Dockerfile 来源仓库和构建参数

# 全局配置
global:
  registry: quay.io
  organization: ${QUAY_ORG}           # 从 GitHub Variables 读取
  platforms:
    - linux/amd64
    - linux/arm64

# 源仓库列表
sources:
  # 示例：公开仓库
  - name: base-images
    url: https://github.com/your-org/base-images.git
    branch: main

  # 示例：私有仓库（需要配置 Deploy Key）
  # - name: private-repo
  #   url: git@github.com:your-org/private-repo.git
  #   branch: main
  #   deploy_key: SSH_DEPLOY_KEY_PRIVATE

# 镜像构建配置
images:
  # 示例：CentOS 9 + Python
  - name: centos9-python
    source: base-images
    dockerfile: python/Dockerfile
    tags:
      - latest
      - "3.12"
    build_args:
      PYTHON_VERSION: "3.12"

  # 示例：CentOS 9 + Golang
  - name: centos9-golang
    source: base-images
    dockerfile: golang/Dockerfile
    tags:
      - latest
      - "1.21"
    build_args:
      GO_VERSION: "1.21"

# 构建配置
build:
  severity: CRITICAL,HIGH
  timeout: 30

# SBOM 配置
sbom:
  enabled: true
  formats:
    - spdx
    - cyclonedx
  retention_days: 30

# 通知配置
notifications:
  email:
    enabled: true
    recipients:
      - team@example.com