# 镜像工厂配置文件
# 定义 Dockerfile 来源仓库和构建参数

# 全局配置
global:
  registry: quay.io
  organization: ${QUAY_ORG}           # 从 GitHub Variables 读取
  platforms:
    - linux/amd64
    - linux/arm64

# 源仓库列表
sources:
  # PyTorch 镜像源仓库
  - name: pytorch
    url: https://gitcode.com/kerer-sk/pytorch.git
    branch: master

# 镜像构建配置
images:
  # PyTorch X86 版本 (基于 manylinux-builder:cpu-2.1)
  - name: pytorch
    source: pytorch
    dockerfile: ci/docker/X86/Dockerfile
    tags:
      - x86-manylinux2.1-latest
      - x86-manylinux2.1-2.0
    platforms:
      - linux/amd64

  # PyTorch ARM 版本 (基于 manylinux2014_aarch64)
  - name: pytorch
    source: pytorch
    dockerfile: ci/docker/ARM/Dockerfile
    tags:
      - arm-manylinux2014-latest
      - arm-manylinux2014-2.0
    platforms:
      - linux/arm64

# 构建配置
build:
  severity: CRITICAL,HIGH
  timeout: 30

# SBOM 配置
sbom:
  enabled: true
  formats:
    - spdx
    - cyclonedx
  retention_days: 30